<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Anti-Gaspi - Collège du Vaucluse</title>
    <!-- On charge la bibliothèque pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        .result-summary { 
            margin-top: 20px; 
            padding: 15px; 
            background: #e8f6ef; 
            border-radius: 10px; 
            text-align: center; 
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 Observatoire du Gaspillage</h1>
        <p>Collège du Vaucluse - 700 Demi-pensionnaires</p>
    </header>

    <div class="main-layout">
        <!-- COLONNE GAUCHE : SAISIE -->
        <div class="card">
            <h2>Saisie des pesées (kg)</h2>
            <div class="input-group">
                <label>🥖 Pain</label>
                <input type="number" id="val_pain" value="5" oninput="majGraphique()">
            </div>
            <div class="input-group">
                <label>🧻 Serviettes papier</label>
                <input type="number" id="val_serviettes" value="1" oninput="majGraphique()">
            </div>
            <div class="input-group">
                <label>🍎 Fruits entamés</label>
                <input type="number" id="val_fruits" value="3" oninput="majGraphique()">
            </div>
            <div class="input-group">
                <label>📦 Emballages</label>
                <input type="number" id="val_emballages" value="2" oninput="majGraphique()">
            </div>
            <div class="input-group">
                <label>🍽️ Restes d'assiettes</label>
                <input type="number" id="val_restes" value="15" oninput="majGraphique()">
            </div>
            
            <div class="result-summary" id="total_text">
                Total : 26 kg
            </div>
        </div>

        <!-- COLONNE DROITE : GRAPHIQUE -->
        <div class="card">
            <h2>Répartition des déchets</h2>
            <div class="chart-container">
                <canvas id="monGraphique"></canvas>
            </div>
            <p style="font-size: 0.8rem; color: #777; margin-top: 20px;">
                * Ce graphique montre la part de chaque catégorie dans le gaspillage total de la cantine.
            </p>
        </div>
    </div>
</div>

<script>
    // Initialisation du graphique
    const ctx = document.getElementById('monGraphique').getContext('2d');
    let monGraphique = new Chart(ctx, {
        type: 'doughnut', // Type "Beignet" (un camembert avec un trou au milieu)
        data: {
            labels: ['Pain', 'Serviettes', 'Fruits', 'Emballages', 'Restes'],
            datasets: [{
                data: [5, 1, 3, 2, 15],
                backgroundColor: [
                    '#f1c40f', // Jaune pain
                    '#ecf0f1', // Gris serviettes
                    '#e67e22', // Orange fruits
                    '#95a5a6', // Gris emballages
                    '#e74c3c'  // Rouge restes
                ],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // Fonction pour mettre à jour le graphique en temps réel
    function majGraphique() {
        const v1 = parseFloat(document.getElementById('val_pain').value) || 0;
        const v2 = parseFloat(document.getElementById('val_serviettes').value) || 0;
        const v3 = parseFloat(document.getElementById('val_fruits').value) || 0;
        const v4 = parseFloat(document.getElementById('val_emballages').value) || 0;
        const v5 = parseFloat(document.getElementById('val_restes').value) || 0;

        const total = v1 + v2 + v3 + v4 + v5;

        // Mise à jour des données du graphique
        monGraphique.data.datasets[0].data = [v1, v2, v3, v4, v5];
        monGraphique.update();

        // Mise à jour du texte du total
        document.getElementById('total_text').innerText = "Total : " + total.toFixed(1) + " kg";
    }
</script>

</body>
</html>
