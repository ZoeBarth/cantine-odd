<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Anti-Gaspi Vaucluse</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f9f4; }
        header { text-align: center; background: #2ecc71; color: white; padding: 1rem; border-radius: 10px; }
        .data-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
        h2 { color: #27ae60; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .stat-item { text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Stop au Gaspillage Alimentaire</h1>
        <p>Projet ODD - Collège du Vaucluse (700 élèves)</p>
    </header>

    <div class="data-card">
        <h2>Nos Pesées Hebdomadaires</h2>
        <div class="stats">
            <div class="stat-item">🍞 Pain<br>-- kg</div>
            <div class="stat-item">🍱 Assiettes<br>-- kg</div>
            <div class="stat-item">🍎 Fruits<br>-- kg</div>
        </div>
    </div>

    <div class="data-card">
        <h2>Pourquoi cette page ?</h2>
        <p>Nous mesurons nos déchets pour atteindre l'Objectif de Développement Durable n°12.</p>
    </div>
</body>
</html>
